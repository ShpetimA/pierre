<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>path-store demo</title>
    <style>
      :root {
        color: #111;
        font-family:
          ui-monospace, 'SFMono-Regular', 'SF Mono', Menlo, Consolas,
          'Liberation Mono', monospace;
        line-height: 1.4;
      }

      body {
        margin: 0;
        padding: 24px;
        background: #fafafa;
      }

      h1,
      p {
        margin: 0;
      }

      .app {
        display: grid;
        gap: 16px;
        max-width: 960px;
      }

      .meta {
        display: grid;
        gap: 12px;
      }

      .controls {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .field {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .field label {
        font-size: 12px;
      }

      .field input[type='number'] {
        width: 72px;
      }

      .field select,
      .field input[type='number'],
      .field input[type='range'] {
        font: inherit;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button {
        border: 1px solid #111;
        background: #fff;
        color: inherit;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        line-height: 1.2;
        padding: 5px 8px;
      }

      button:disabled {
        cursor: progress;
        opacity: 0.7;
      }

      .viewport {
        border: 1px solid #111;
        background: #fff;
        min-height: 480px;
        padding: 12px;
      }

      .rows {
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="meta">
        <h1>path-store demo</h1>
        <div class="controls">
          <button id="render-button" type="button">Render</button>
          <div class="field">
            <label for="workload">Workload</label>
            <select id="workload">
              <option value="linux-5x">linux-5x</option>
              <option value="linux">linux</option>
              <option value="demo-small">demo-small</option>
            </select>
          </div>
          <div class="field">
            <label for="visible-count">Visible</label>
            <input
              id="visible-count"
              type="number"
              min="1"
              max="500"
              value="30"
            />
          </div>
          <div class="field">
            <label for="offset">Offset</label>
            <input
              id="offset"
              type="range"
              min="0"
              max="0"
              step="1"
              value="0"
              disabled
            />
            <span id="offset-value">0</span>
          </div>
        </div>
        <div class="actions">
          <button data-action-id="reset" disabled type="button">
            Reset store
          </button>
          <button
            data-action-id="collapse-visible-folder"
            disabled
            type="button"
          >
            Collapse visible folder
          </button>
          <button data-action-id="expand-visible-folder" disabled type="button">
            Expand visible folder
          </button>
          <button data-action-id="rename-visible-folder" disabled type="button">
            Rename visible folder
          </button>
          <button data-action-id="delete-visible-folder" disabled type="button">
            Delete visible folder
          </button>
          <button data-action-id="rename-visible-leaf" disabled type="button">
            Rename visible leaf
          </button>
          <button data-action-id="delete-visible-leaf" disabled type="button">
            Delete visible leaf
          </button>
          <button
            data-action-id="move-visible-folder-to-parent"
            disabled
            type="button"
          >
            Move visible folder to parent
          </button>
          <button
            data-action-id="move-visible-leaf-to-parent"
            disabled
            type="button"
          >
            Move visible leaf to parent
          </button>
          <button
            data-action-id="collapse-folder-above-viewport"
            disabled
            type="button"
          >
            Collapse folder above viewport
          </button>
        </div>
      </div>
      <div class="viewport">
        <div class="rows" id="rows"></div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
