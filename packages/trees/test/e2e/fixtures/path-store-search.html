<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>path-store search fixture</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
      }
      [data-path-store-search-shell] {
        display: grid;
        gap: 16px;
        max-width: 760px;
      }
      [data-path-store-search-row] {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      [data-path-store-search-mount] {
        width: 340px;
        height: 280px;
        border: 1px solid #ccc;
      }
      [data-path-store-search-log] {
        height: 120px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 8px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div data-path-store-search-shell>
      <div data-path-store-search-row>
        <div>
          <h2>visible search</h2>
          <div data-path-store-search-mount="visible"></div>
        </div>
        <div>
          <h2>hidden input search</h2>
          <div data-path-store-search-mount="hidden"></div>
          <div style="display: flex; gap: 8px; margin-top: 8px">
            <button type="button" data-hidden-search-open>
              Open hidden search
            </button>
            <button type="button" data-hidden-search-close>
              Close hidden search
            </button>
          </div>
        </div>
      </div>
      <div data-path-store-search-log></div>
    </div>

    <script type="module">
      import { PathStoreFileTree } from '/dist/path-store/index.js';

      const paths = [
        'README.md',
        'package.json',
        'src/index.ts',
        'src/components/Button.tsx',
        'src/components/Card.tsx',
        ...Array.from({ length: 18 }, (_unused, index) => {
          return `src/generated/file-${String(index)}.ts`;
        }),
        'src/utils/worker/index.ts',
        'src/utils/worker/deprecated/old-worker.ts',
        'src/utils/worker.ts',
        'src/utils/stream.ts',
        'test/index.test.ts',
      ];
      const log = document.querySelector('[data-path-store-search-log]');
      const visibleMount = document.querySelector(
        '[data-path-store-search-mount="visible"]'
      );
      const hiddenMount = document.querySelector(
        '[data-path-store-search-mount="hidden"]'
      );
      if (
        !(log instanceof HTMLDivElement) ||
        !(visibleMount instanceof HTMLDivElement) ||
        !(hiddenMount instanceof HTMLDivElement)
      ) {
        throw new Error('Missing search fixture mounts.');
      }

      const appendLog = (message) => {
        const row = document.createElement('div');
        row.textContent = message;
        log.append(row);
        log.scrollTop = log.scrollHeight;
      };

      const visibleTree = new PathStoreFileTree({
        fileTreeSearchMode: 'hide-non-matches',
        flattenEmptyDirectories: true,
        id: 'pst-search-visible',
        initialExpansion: 'open',
        onSearchChange: (value) => appendLog(`visible:${value ?? '<closed>'}`),
        paths,
        search: true,
        viewportHeight: 260,
      });
      visibleTree.render({ containerWrapper: visibleMount });

      const hiddenTree = new PathStoreFileTree({
        fileTreeSearchMode: 'hide-non-matches',
        flattenEmptyDirectories: true,
        id: 'pst-search-hidden-fixture',
        initialExpansion: 'open',
        onSearchChange: (value) => appendLog(`hidden:${value ?? '<closed>'}`),
        paths,
        search: false,
        viewportHeight: 260,
      });
      hiddenTree.render({ containerWrapper: hiddenMount });

      document
        .querySelector('[data-hidden-search-open]')
        ?.addEventListener('click', () => {
          hiddenTree.openSearch('worker');
        });
      document
        .querySelector('[data-hidden-search-close]')
        ?.addEventListener('click', () => {
          hiddenTree.closeSearch();
        });

      const waitForTree = async () => {
        const started = performance.now();
        while (true) {
          const visibleHost = visibleMount.querySelector('file-tree-container');
          const hiddenHost = hiddenMount.querySelector('file-tree-container');
          if (
            visibleHost instanceof HTMLElement &&
            hiddenHost instanceof HTMLElement &&
            visibleHost.shadowRoot?.querySelector('button[data-type="item"]') !=
              null &&
            hiddenHost.shadowRoot?.querySelector('button[data-type="item"]') !=
              null
          ) {
            return;
          }
          if (performance.now() - started > 5000) {
            throw new Error(
              'Timed out waiting for the path-store search fixture.'
            );
          }
          await new Promise((resolve) => setTimeout(resolve, 16));
        }
      };

      await waitForTree();
      window.__pathStoreSearchFixtureReady = true;
    </script>
  </body>
</html>
