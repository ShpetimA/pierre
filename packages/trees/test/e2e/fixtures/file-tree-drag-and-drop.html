<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>file-tree drag-and-drop fixture</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
      }

      [data-file-tree-dnd-shell] {
        display: grid;
        gap: 12px;
        max-width: 420px;
      }

      [data-file-tree-dnd-mount] {
        width: 360px;
        height: 320px;
        border: 1px solid #ccc;
      }

      [data-file-tree-dnd-log] {
        height: 120px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 8px;
        font-family: ui-monospace, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div data-file-tree-dnd-shell>
      <div data-file-tree-dnd-mount></div>
      <div data-file-tree-dnd-log></div>
    </div>

    <script type="module">
      import { FileTree } from '/dist/index.js';

      const mount = document.querySelector('[data-file-tree-dnd-mount]');
      const log = document.querySelector('[data-file-tree-dnd-log]');
      if (
        !(mount instanceof HTMLDivElement) ||
        !(log instanceof HTMLDivElement)
      ) {
        throw new Error('Missing file-tree drag-and-drop fixture shell.');
      }

      const preserveInputOrder = () => 0;
      const paths = [
        'README.md',
        'package.json',
        'assets/images/social/logo.png',
        'assets/images/social/banner.png',
        'docs/guides/getting-started.md',
        'docs/guides/faq.md',
        'src/index.ts',
        'src/lib/utils.ts',
        'src/lib/theme.ts',
        ...Array.from(
          { length: 80 },
          (_, index) => `workspace/demo-${String(index).padStart(2, '0')}.ts`
        ),
      ];

      const appendLog = (message) => {
        const row = document.createElement('div');
        row.textContent = message;
        log.append(row);
        log.scrollTop = log.scrollHeight;
      };

      const fileTree = new FileTree({
        dragAndDrop: {
          onDropComplete: (event) => {
            window.__lastDropResult = event;
            appendLog(`drop:${event.operation}`);
          },
          onDropError: (error, event) => {
            window.__lastDropError = {
              draggedPaths: [...event.draggedPaths],
              error,
              target: event.target,
            };
            appendLog(`drop:error ${error}`);
          },
          openOnDropDelay: 800,
        },
        flattenEmptyDirectories: true,
        initialExpandedPaths: [
          'assets/images/social/',
          'src/',
          'src/lib/',
          'workspace/',
        ],
        paths,
        search: true,
        sort: preserveInputOrder,
        viewportHeight: 320,
      });

      fileTree.onMutation('*', (event) => {
        window.__mutationLog ??= [];
        window.__mutationLog.push(event.operation);
        appendLog(`mutation:${event.operation}`);
      });
      fileTree.render({ containerWrapper: mount });

      const waitForTree = async () => {
        const started = performance.now();
        while (true) {
          const host = mount.querySelector('file-tree-container');
          if (
            host instanceof HTMLElement &&
            host.shadowRoot?.querySelector('button[data-type="item"]') != null
          ) {
            return host;
          }

          if (performance.now() - started > 5000) {
            throw new Error(
              'Timed out waiting for the file-tree drag-and-drop fixture.'
            );
          }

          await new Promise((resolve) => setTimeout(resolve, 16));
        }
      };

      const host = await waitForTree();
      const getShadow = () => host.shadowRoot;
      window.__hasPath = (path) => fileTree.getItem(path) != null;
      window.__getVisiblePaths = () =>
        Array.from(
          getShadow()?.querySelectorAll('button[data-type="item"]') ?? []
        )
          .filter(
            (button) => button.getAttribute('data-item-parked') !== 'true'
          )
          .map((button) => button.getAttribute('data-item-path'))
          .filter((path) => path != null);
      window.__getFlattenedSegments = () =>
        Array.from(
          getShadow()?.querySelectorAll('[data-item-flattened-subitem]') ?? []
        )
          .map((element) => element.getAttribute('data-item-flattened-subitem'))
          .filter((path) => path != null);
      window.__getDragState = () => ({
        dragging: Array.from(
          getShadow()?.querySelectorAll('[data-item-dragging="true"]') ?? []
        )
          .map((element) => element.getAttribute('data-item-path'))
          .filter((path) => path != null),
        parked: Array.from(
          getShadow()?.querySelectorAll('[data-item-parked="true"]') ?? []
        )
          .map((element) => element.getAttribute('data-item-path'))
          .filter((path) => path != null),
        targets: Array.from(
          getShadow()?.querySelectorAll('[data-item-drag-target="true"]') ?? []
        )
          .map((element) => element.getAttribute('data-item-path'))
          .filter((path) => path != null),
      });
      window.__fileTreeDragAndDropReady = true;
    </script>
  </body>
</html>
