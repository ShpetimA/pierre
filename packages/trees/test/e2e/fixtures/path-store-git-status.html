<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>path-store git-status fixture</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
      }

      [data-path-store-git-status-shell] {
        display: grid;
        gap: 16px;
        max-width: 760px;
      }

      [data-path-store-git-status-controls] {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      [data-path-store-git-status-mount] {
        width: 360px;
        height: 280px;
        border: 1px solid #ccc;
      }

      [data-path-store-git-status-state] {
        font-family: ui-monospace, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div data-path-store-git-status-shell>
      <div data-path-store-git-status-controls>
        <button
          type="button"
          data-path-store-git-status-action="toggle-enabled"
        >
          Disable
        </button>
        <button type="button" data-path-store-git-status-action="set-a">
          Use Set A
        </button>
        <button type="button" data-path-store-git-status-action="set-b">
          Use Set B
        </button>
      </div>
      <div data-path-store-git-status-state></div>
      <div data-path-store-git-status-mount></div>
    </div>

    <script type="module">
      import { PathStoreFileTree } from '/dist/path-store/index.js';

      const paths = [
        'README.md',
        'package.json',
        'src/index.ts',
        'src/components/Button.tsx',
        'src/components/Card.tsx',
        'src/utils/worker.ts',
        'src/utils/stream.ts',
        'test/index.test.ts',
      ];
      const statusesA = [
        { path: 'src/index.ts', status: 'modified' },
        { path: 'src/components/Button.tsx', status: 'added' },
        { path: 'test/index.test.ts', status: 'deleted' },
      ];
      const statusesB = [
        { path: 'README.md', status: 'modified' },
        { path: 'src/utils/worker.ts', status: 'added' },
      ];
      const mount = document.querySelector(
        '[data-path-store-git-status-mount]'
      );
      const state = document.querySelector(
        '[data-path-store-git-status-state]'
      );
      if (
        !(mount instanceof HTMLDivElement) ||
        !(state instanceof HTMLDivElement)
      ) {
        throw new Error('Missing git-status fixture mounts.');
      }

      let enabled = true;
      let activeSet = 'A';
      const getActiveStatuses = () => {
        if (!enabled) {
          return undefined;
        }
        return activeSet === 'A' ? statusesA : statusesB;
      };
      const syncState = () => {
        state.textContent = `enabled=${String(enabled)} set=${activeSet}`;
        const toggleButton = document.querySelector(
          '[data-path-store-git-status-action="toggle-enabled"]'
        );
        if (toggleButton instanceof HTMLButtonElement) {
          toggleButton.textContent = enabled ? 'Disable' : 'Enable';
        }
      };

      const tree = new PathStoreFileTree({
        flattenEmptyDirectories: false,
        gitStatus: getActiveStatuses(),
        id: 'pst-git-status-fixture',
        initialExpansion: 'open',
        paths,
        viewportHeight: 240,
      });
      tree.render({ containerWrapper: mount });
      syncState();

      document
        .querySelector('[data-path-store-git-status-action="toggle-enabled"]')
        ?.addEventListener('click', () => {
          enabled = !enabled;
          tree.setGitStatus(getActiveStatuses());
          syncState();
        });
      document
        .querySelector('[data-path-store-git-status-action="set-a"]')
        ?.addEventListener('click', () => {
          activeSet = 'A';
          enabled = true;
          tree.setGitStatus(getActiveStatuses());
          syncState();
        });
      document
        .querySelector('[data-path-store-git-status-action="set-b"]')
        ?.addEventListener('click', () => {
          activeSet = 'B';
          enabled = true;
          tree.setGitStatus(getActiveStatuses());
          syncState();
        });

      const waitForTree = async () => {
        const started = performance.now();
        while (true) {
          const host = mount.querySelector('file-tree-container');
          if (
            host instanceof HTMLElement &&
            host.shadowRoot?.querySelector('button[data-type="item"]') != null
          ) {
            return;
          }
          if (performance.now() - started > 5000) {
            throw new Error(
              'Timed out waiting for the path-store git-status fixture.'
            );
          }
          await new Promise((resolve) => setTimeout(resolve, 16));
        }
      };

      await waitForTree();
      window.__pathStoreGitStatusFixtureReady = true;
    </script>
  </body>
</html>
