<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>trees path-store profile fixture</title>
    <style>
      :root {
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        color: #111827;
        background: #f5f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 32px 20px;
      }

      main {
        max-width: 1040px;
        margin: 0 auto;
      }

      [data-profile-card] {
        padding: 24px;
        border: 1px solid #dbe1ea;
        border-radius: 16px;
        background: #ffffff;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      }

      [data-profile-controls] {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 16px;
      }

      [data-profile-controls] label {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
      }

      [data-profile-controls] select,
      [data-profile-render-button] {
        min-height: 40px;
        padding: 0 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font: inherit;
        color: #111827;
        background: #ffffff;
      }

      [data-profile-render-button] {
        font-weight: 600;
        cursor: pointer;
      }

      [data-profile-render-button]:disabled {
        opacity: 0.65;
        cursor: progress;
      }

      [data-profile-mount] {
        height: 500px;
        overflow: hidden;
        border: 1px solid #dbe1ea;
        border-radius: 12px;
        background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
      }
    </style>
  </head>
  <body>
    <main>
      <section data-profile-card>
        <div data-profile-controls>
          <label>
            Workload
            <select id="workload"></select>
          </label>
          <button type="button" data-profile-render-button>Render</button>
        </div>
        <div data-profile-mount></div>
      </section>
    </main>

    <script type="module" src="./path-store-profile-main.ts"></script>
  </body>
</html>
